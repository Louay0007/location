 <div class="filters-sidebar">
  <div class="filters-header">
    <h2 class="filters-title">Filtres</h2>
    @if (hasActiveFilters()) {
      <button class="clear-btn" (click)="onClearAll()">
        Effacer tout
      </button>
    }
  </div>

  <!-- Category Filter -->
  <div class="filter-section">
    <button type="button" class="section-header" (click)="toggleSection('category')">
      <span class="section-title">Catégorie</span>
      <svg class="section-chevron" [class.expanded]="isSectionExpanded('category')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="section-body" [class.open]="isSectionExpanded('category')">
      <div class="section-content">
        <div class="category-grid">
          @for (cat of categories; track cat.value) {
            <button
              class="category-chip"
              [class.selected]="isCategorySelected(cat.value)"
              (click)="toggleCategory(cat.value)"
            >
              <svg class="category-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                @switch (cat.value) {
                  @case ('ECONOMY') { <circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/> }
                  @case ('COMPACT') { <path d="M5 17h14M5 17a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/> }
                  @case ('SEDAN') { <path d="M5 17h14M5 17a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/> }
                  @case ('SUV') { <path d="M5 17h14M5 17a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l3 4h7a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/> }
                  @case ('LUXURY') { <path d="M5 17h14M5 17a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3l3 3h8a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M12 7l1-3"/> }
                  @case ('VAN') { <rect x="3" y="8" width="18" height="9" rx="2"/><path d="M5 17v2M19 17v2"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M3 12h18"/> }
                }
              </svg>
              <span class="category-label">{{ cat.label }}</span>
            </button>
          }
        </div>
      </div>
    </div>
  </div>

  <!-- Price Range -->
  <div class="filter-section">
    <button type="button" class="section-header" (click)="toggleSection('price')">
      <span class="section-title">Prix journalier</span>
      <svg class="section-chevron" [class.expanded]="isSectionExpanded('price')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="section-body" [class.open]="isSectionExpanded('price')">
      <div class="section-content">
        <div class="price-range">
          <div class="price-inputs">
            <div class="price-input">
              <label>Min</label>
              <input
                type="number"
                [(ngModel)]="minPrice"
                (ngModelChange)="onPriceRangeChange()"
                min="0"
                max="500"
                step="10"
              />
            </div>
            <div class="price-input">
              <label>Max</label>
              <input
                type="number"
                [(ngModel)]="maxPrice"
                (ngModelChange)="onPriceRangeChange()"
                min="0"
                max="500"
                step="10"
              />
            </div>
          </div>
          <input
            type="range"
            class="range-slider"
            [min]="0"
            [max]="500"
            [(ngModel)]="maxPrice"
            (ngModelChange)="onPriceRangeChange()"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Fuel Type -->
  <div class="filter-section">
    <button type="button" class="section-header" (click)="toggleSection('fuel')">
      <span class="section-title">Carburant</span>
      <svg class="section-chevron" [class.expanded]="isSectionExpanded('fuel')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="section-body" [class.open]="isSectionExpanded('fuel')">
      <div class="section-content">
        <div class="checkbox-list">
          @for (fuel of fuelTypes; track fuel.value) {
            <label class="checkbox-item">
              <input
                type="checkbox"
                [checked]="isFuelTypeSelected(fuel.value)"
                (change)="toggleFuelType(fuel.value)"
              />
              <svg class="checkbox-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                @switch (fuel.value) {
                  @case ('ESSENCE') { <path d="M3 22V6l6-4 6 4v16"/><path d="M9 22V12"/> }
                  @case ('DIESEL') { <path d="M3 22V6l6-4 6 4v16"/><path d="M9 22V12"/><path d="M15 12h2a2 2 0 0 1 2 2v2"/> }
                  @case ('HYBRID') { <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/> }
                  @case ('ELECTRIC') { <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/> }
                }
              </svg>
              <span class="checkbox-label">{{ fuel.label }}</span>
            </label>
          }
        </div>
      </div>
    </div>
  </div>

  <!-- Transmission -->
  <div class="filter-section">
    <button type="button" class="section-header" (click)="toggleSection('transmission')">
      <span class="section-title">Transmission</span>
      <svg class="section-chevron" [class.expanded]="isSectionExpanded('transmission')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="section-body" [class.open]="isSectionExpanded('transmission')">
      <div class="section-content">
        <div class="checkbox-list">
          @for (trans of transmissions; track trans.value) {
            <label class="checkbox-item">
              <input
                type="checkbox"
                [checked]="isTransmissionSelected(trans.value)"
                (change)="toggleTransmission(trans.value)"
              />
              <svg class="checkbox-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                @switch (trans.value) {
                  @case ('MANUAL') { <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/> }
                  @case ('AUTOMATIC') { <rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/> }
                }
              </svg>
              <span class="checkbox-label">{{ trans.label }}</span>
            </label>
          }
        </div>
      </div>
    </div>
  </div>

  <!-- Seats -->
  <div class="filter-section">
    <button type="button" class="section-header" (click)="toggleSection('seats')">
      <span class="section-title">Nombre de places</span>
      <svg class="section-chevron" [class.expanded]="isSectionExpanded('seats')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="section-body" [class.open]="isSectionExpanded('seats')">
      <div class="section-content">
        <div class="seats-range">
          <div class="range-value">{{ minSeats() }} - {{ maxSeats() }} places</div>
          <input
            type="range"
            class="range-slider"
            [min]="2"
            [max]="9"
            [(ngModel)]="maxSeats"
            (ngModelChange)="onSeatsRangeChange()"
          />
        </div>
      </div>
    </div>
  </div>
</div>
